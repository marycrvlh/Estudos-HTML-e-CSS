<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Exemplo de Inputs</title>
</head>
<body>
    <h1> Exemplo de Inputs </h1>
    <form>
        <label> TEXTO: </label>
        <input type="text" placeholder="Digite o seu nome completo...">
        
        <label> SENHA: </label>
        <input type="password" placeholder="Digite a sua senha aqui...">
        
        <label> E-MAIL: </label>
        <input type="email" placeholder="Digite o seu e-mail aqui">

        <label> NÚMERO: </label>
        <input type="number" placeholder="Digites seu número...">

        <label> SEU TELEFONE: </label>
        <input type="tel" placeholder="(99) 99999-9999">

        <label> URL: </label>
        <input type="url" placeholder="https://exemple.com">

        <label> DATA: </label>
        <input type="date" placeholder="DD/MM/AAAA">

        <label> DATA E HORA: </label>
        <input type="datetime-local" placeholder="DD/MM/AAAA HH:MM:SS">

        <label> COR: </label>
        <input type="color">

        <label> CHECK-BOX: </label>
        <input type="checkbox"> Aceito os termos de uso

        <label> RADIO: </label>
        <input type="radio" name="genero" value="M"> Masculino
        <input type="radio" name="genero" value="F"> Feminino


        <label> ARQUIVO: </label>
        <input type="text">

        <div class="buttons">
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
